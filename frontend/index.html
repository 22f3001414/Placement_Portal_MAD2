<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Placement Portal</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />

  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
    .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <!-- Vue mounts here -->
  <div id="app"></div>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Vue Router 4 CDN -->
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Component definitions (must load before main.js) -->
  <script src="/src/components/LoginPage.js"></script>
  <script src="/src/components/RegisterStudent.js"></script>
  <script src="/src/components/RegisterCompany.js"></script>
  <script src="/src/components/Navbar.js"></script>
  <script src="/src/components/AdminDashboard.js"></script>
  <script src="/src/components/CompanyDashboard.js"></script>
  <script src="/src/components/StudentDashboard.js"></script>

  <!-- Router and app initialization -->
  <script src="/src/router.js"></script>
  <script src="/src/main.js"></script>

</html>
